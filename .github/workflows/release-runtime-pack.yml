name: release-runtime-pack

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-runtime-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build runtime pack
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          from pathlib import Path
          import zipfile
          from datetime import datetime, timezone

          root = Path(".").resolve()
          out = root / "dist"
          out.mkdir(parents=True, exist_ok=True)
          tag = "${{ github.ref_name }}".strip() or "manual"
          pack_name = f"iwp-runtime-pack-{tag}.zip"
          pack_path = out / pack_name
          manifest_path = out / f"iwp-runtime-pack-{tag}.manifest.json"

          entries = [
              "protocol/IWP-v1.md",
              "whitepaper/manifesto.md",
              "schema/IWP-Schema-v1.md",
              "schema/README.md",
              "agent/v2/agent.md",
              "agent/v2/skills/README.md",
              "agent/v2/skills/01-intent-authoring.md",
              "agent/v2/skills/02-ir-implementation.md",
              "agent/v2/skills/03-link-alignment.md",
              "agent/v2/skills/04-reverse-review.md",
          ]

          missing = [item for item in entries if not (root / item).is_file()]
          if missing:
              raise SystemExit(f"missing runtime pack files: {missing}")

          files = []
          with zipfile.ZipFile(pack_path, "w", compression=zipfile.ZIP_DEFLATED, compresslevel=9) as zf:
              for rel in entries:
                  path = root / rel
                  data = path.read_bytes()
                  digest = hashlib.sha256(data).hexdigest()
                  files.append({"path": rel, "sha256": digest, "size": len(data)})
                  info = zipfile.ZipInfo(rel)
                  info.date_time = (1980, 1, 1, 0, 0, 0)
                  info.external_attr = 0o100644 << 16
                  zf.writestr(info, data, compress_type=zipfile.ZIP_DEFLATED)

          pack_sha256 = hashlib.sha256(pack_path.read_bytes()).hexdigest()
          manifest = {
              "schema_version": "1.0.0",
              "generated_at": datetime.now(timezone.utc).isoformat(),
              "source_repo": "InstructWare/instructware.org",
              "release_tag": tag,
              "pack": {
                  "file_name": pack_name,
                  "sha256": pack_sha256,
                  "size": pack_path.stat().st_size,
              },
              "files": files,
          }
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          (out / f"{pack_name}.sha256").write_text(f"{pack_sha256}  {pack_name}\n", encoding="utf-8")
          PY

      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/iwp-runtime-pack-*.zip
            dist/iwp-runtime-pack-*.manifest.json
            dist/iwp-runtime-pack-*.zip.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
