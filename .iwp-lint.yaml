iwp_root: InstructWare.iw
code_roots:
  - _ir/
tracking:
  protocol:
    include_ext:
      - .vue
      - .py
      - .ts
      - .tsx
      - .js
      - .jsx
      - .css
    exclude_globs:
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/__pycache__/**"
      - "**/.pytest_cache/**"
  snapshot:
    include_ext:
      - .vue
      - .py
      - .ts
      - .tsx
      - .js
      - .jsx
      - .css
      - .sh
      - .yaml
      - .yml
      - .json
      - .toml
    exclude_globs:
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/__pycache__/**"
      - "**/.pytest_cache/**"

thresholds:
  node_linked_min: 60
  critical_linked_min: 80
  node_tested_min: 0

enable_profile_coverage: true
diff_defaults:
  base: HEAD~1
  head: HEAD

schema:
  file: builtin
  mode: compat
  page_only:
    enabled: true
  exclude_markdown_globs:
    - README.md
    - dependency.md
    - architecture.md

authoring:
  node_generation_mode: annotated_only
  strict_annotation_params: true

execution_presets:
  agent-default:
    session_start:
      if_missing: true
    session_diff:
      node_severity: error
      markdown_excerpt_max_chars: 240
      include_baseline_gaps: true
      max_gap_items: 20
      format: both
      json: out/session-diff.json
    session_reconcile:
      node_severity: error
      format: both
      json: out/session-reconcile.json
      max_diagnostics: 20
      min_severity: error
      warning_top_n: 2
      suggest_fixes: true
      auto_build_sidecar: true
    session_commit:
      evidence_json: out/session-evidence.json
      json: out/session-commit.json
  ci-strict:
    verify:
      with_tests: true
      min_severity: error
    session_commit:
      evidence_json: out/session-evidence.json
      json: out/session-commit.json
